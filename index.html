<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mint Street Studios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:   #101820;
      --blue:    #0085CA;
      --silver:  #BFC0BF;
      --white:   #F0F4F8;
      --glow:    rgba(0, 133, 202, 0.55);
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      overflow: hidden;
    }

    #stars {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .panther-wrap {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .panther-wrap svg {
      width: min(72vw, 72vh);
      height: min(72vw, 72vh);
      opacity: 0;
      animation: fadeIn 1.6s 0.4s ease forwards;
    }

    .stage {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 0;
    }

    .eyebrow {
      font-family: 'Barlow', sans-serif;
      font-weight: 600;
      font-size: clamp(0.65rem, 1.6vw, 0.85rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--blue);
      opacity: 0;
      animation: slideUp 0.8s 0.8s cubic-bezier(.22,1,.36,1) forwards;
      margin-bottom: 0.6rem;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.2rem, 12vw, 9rem);
      line-height: 0.92;
      letter-spacing: 0.02em;
      background: linear-gradient(160deg, var(--white) 30%, var(--silver) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      animation: slideUp 0.9s 1.0s cubic-bezier(.22,1,.36,1) forwards;
      filter: drop-shadow(0 0 40px var(--glow));
      margin-bottom: 1.4rem;
    }

    .divider {
      width: clamp(60px, 12vw, 120px);
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--blue), transparent);
      opacity: 0;
      animation: fadeIn 0.8s 1.4s ease forwards;
      margin-bottom: 1.4rem;
    }

    .coming-soon {
      font-family: 'Barlow', sans-serif;
      font-weight: 600;
      font-size: clamp(1rem, 3.5vw, 1.6rem);
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--blue);
      opacity: 0;
      animation: slideUp 0.8s 1.6s cubic-bezier(.22,1,.36,1) forwards;
    }

    .claws {
      position: fixed;
      z-index: 1;
      pointer-events: none;
    }
    .claws.tl { top: -10px; left: -10px; transform: rotate(-15deg); }
    .claws.br { bottom: -10px; right: -10px; transform: rotate(165deg); }
    .claws svg { opacity: 0.18; }

    .corner-glow {
      position: fixed;
      width: 50vw;
      height: 50vh;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(0,133,202,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .corner-glow.bl { bottom: -10vh; left: -10vw; }
    .corner-glow.tr { top: -10vh; right: -10vw; }

    @keyframes fadeIn {
      to { opacity: 1; }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <canvas id="stars"></canvas>

  <div class="corner-glow bl"></div>
  <div class="corner-glow tr"></div>

  <div class="panther-wrap">
    <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#0085CA" stop-opacity="0.13"/>
          <stop offset="100%" stop-color="#101820" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="body-grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#2a2f38"/>
          <stop offset="100%" stop-color="#101820"/>
        </linearGradient>
        <linearGradient id="eye-grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#0085CA"/>
          <stop offset="100%" stop-color="#00b4ff"/>
        </linearGradient>
        <filter id="glow-filter">
          <feGaussianBlur stdDeviation="4" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="eye-glow">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <circle cx="200" cy="200" r="180" fill="url(#bg-glow)"/>
      <ellipse cx="210" cy="230" rx="95" ry="55" fill="url(#body-grad)" filter="url(#glow-filter)"/>
      <ellipse cx="290" cy="245" rx="50" ry="45" fill="#1a1f27"/>
      <ellipse cx="145" cy="215" rx="45" ry="40" fill="#1e232c"/>
      <ellipse cx="155" cy="195" rx="28" ry="32" fill="#1e232c"/>
      <ellipse cx="148" cy="168" rx="38" ry="34" fill="#222830"/>
      <polygon points="120,145 108,118 135,138" fill="#1a1f27"/>
      <polygon points="122,143 112,121 132,136" fill="#0085CA" opacity="0.35"/>
      <polygon points="165,140 172,113 182,138" fill="#1a1f27"/>
      <polygon points="167,138 173,117 180,136" fill="#0085CA" opacity="0.35"/>
      <ellipse cx="138" cy="180" rx="18" ry="13" fill="#1a2028"/>
      <ellipse cx="132" cy="176" rx="6" ry="4" fill="#0d1118"/>
      <path d="M 130 172 Q 133 170 136 172" stroke="#BFC0BF" stroke-width="1.2" fill="none" opacity="0.5"/>
      <ellipse cx="155" cy="162" rx="7" ry="5" fill="url(#eye-grad)" filter="url(#eye-glow)"/>
      <ellipse cx="175" cy="160" rx="7" ry="5" fill="url(#eye-grad)" filter="url(#eye-glow)"/>
      <ellipse cx="155" cy="162" rx="2.5" ry="4" fill="#000" opacity="0.7"/>
      <ellipse cx="175" cy="160" rx="2.5" ry="4" fill="#000" opacity="0.7"/>
      <circle cx="157" cy="160" r="1.5" fill="white" opacity="0.7"/>
      <circle cx="177" cy="158" r="1.5" fill="white" opacity="0.7"/>
      <rect x="120" y="255" width="22" height="50" rx="10" fill="#1a1f27"/>
      <rect x="150" y="260" width="22" height="48" rx="10" fill="#1e232c"/>
      <ellipse cx="131" cy="305" rx="14" ry="8" fill="#161b22"/>
      <ellipse cx="161" cy="308" rx="14" ry="8" fill="#161b22"/>
      <rect x="265" y="265" width="22" height="45" rx="10" fill="#161b22"/>
      <rect x="295" y="258" width="20" height="50" rx="10" fill="#1a1f27"/>
      <ellipse cx="276" cy="310" rx="14" ry="7" fill="#161b22"/>
      <ellipse cx="305" cy="308" rx="13" ry="7" fill="#161b22"/>
      <path d="M 300 235 Q 350 200 345 155 Q 340 120 320 110" stroke="#1e232c" stroke-width="16" fill="none" stroke-linecap="round"/>
      <path d="M 300 235 Q 350 200 345 155 Q 340 120 320 110" stroke="#252b34" stroke-width="10" fill="none" stroke-linecap="round"/>
      <line x1="125" y1="178" x2="90" y2="172" stroke="#BFC0BF" stroke-width="0.8" opacity="0.5"/>
      <line x1="124" y1="182" x2="88" y2="180" stroke="#BFC0BF" stroke-width="0.8" opacity="0.5"/>
      <line x1="125" y1="186" x2="92" y2="191" stroke="#BFC0BF" stroke-width="0.8" opacity="0.5"/>
      <path d="M 155 210 Q 200 195 255 215" stroke="#0085CA" stroke-width="2" fill="none" opacity="0.4" stroke-dasharray="6 4"/>
      <g opacity="0.07" stroke="#0085CA" stroke-width="1.5" fill="none">
        <path d="M 70 80 L 90 130"/>
        <path d="M 80 75 L 98 126"/>
        <path d="M 60 83 L 78 132"/>
      </g>
    </svg>
  </div>

  <div class="claws tl">
    <svg width="140" height="140" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
      <g stroke="#0085CA" stroke-width="2" fill="none" stroke-linecap="round">
        <path d="M 10 10 Q 40 30 20 80"/>
        <path d="M 24 6 Q 54 28 36 78"/>
        <path d="M 40 4 Q 68 28 52 76"/>
      </g>
    </svg>
  </div>
  <div class="claws br">
    <svg width="140" height="140" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
      <g stroke="#0085CA" stroke-width="2" fill="none" stroke-linecap="round">
        <path d="M 10 10 Q 40 30 20 80"/>
        <path d="M 24 6 Q 54 28 36 78"/>
        <path d="M 40 4 Q 68 28 52 76"/>
      </g>
    </svg>
  </div>

  <div class="stage">
    <h1>Mint Street<br/>Studios</h1>
    <div class="divider"></div>
    <p class="coming-soon">Coming Soon</p>
  </div>

  <script>
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function init() {
      particles = Array.from({length: 140}, () => ({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.4 + 0.2,
        a: Math.random(),
        sp: Math.random() * 0.004 + 0.001,
        ph: Math.random() * Math.PI * 2
      }));
    }

    function draw(t) {
      ctx.clearRect(0, 0, W, H);
      particles.forEach(p => {
        p.a = 0.25 + 0.55 * Math.abs(Math.sin(p.ph + t * p.sp));
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        const blue = Math.random() > 0.85;
        ctx.fillStyle = blue
          ? `rgba(0, 133, 202, ${p.a * 0.7})`
          : `rgba(191, 192, 191, ${p.a * 0.6})`;
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', () => { resize(); init(); });
    resize(); init();
    requestAnimationFrame(draw);
  </script>
</body>
</html>
